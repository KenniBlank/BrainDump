<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/BrainDump/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' cdn.jsdelivr.net;">
		<title>Blog</title>

		<script>
		window.MathJax = {
			tex: {
				inlineMath: [['$', '$'], ['\\(', '\\)']],
				displayMath: [['$$', '$$'], ['\\[', '\\]']],

				processEscapes: true, // Allows using \$ to write a literal dollar sign

				// Auto-number equations if use \begin{equation} or \begin{align}
				tags: 'ams',
			},
			options: {
				ignoreHtmlClass: 'tex2jax_ignore'
			},
			svg: { fontCache: 'global' }
		};
		</script>
		<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-svg.js" crossorigin="anonymous"></script>
		<script type="module" crossorigin src="/BrainDump/assets/index-DTaXHAlc.js"></script>
		<link rel="stylesheet" crossorigin href="/BrainDump/assets/index-Dy-deYIi.css">
	</head>
	<body>
		<header class="site-header">
			<h1><a href="/BrainDump/">Brain Dump</a></h1>
		</header>

		<main class="layout">
			<aside class="sidebar">
				<h2>POSTS LIST</h2>
				<nav id="tree"></nav>
			</aside>
			<button id="sidebar-hide_show" class="sidebar-toggle" aria-label="Toggle sidebar"></button>
			<article class="content" id="content">
				<h2>Welcome</h2>
				<p>Select a post to read.</p>
			</article>
		</main>


		<script>
		const layout = document.querySelector('.layout');
		const toggleBtn = document.getElementById('sidebar-hide_show');
		const MOBILE = 768;
		let isMobile = window.innerWidth <= MOBILE;

		const toggleBtnTxt = () => {
			const isCollapsed = layout.classList.contains('sidebar-collapsed');
			const arrow = isMobile
				? (isCollapsed ? '&#9650;' : '&#9660;')   // ▼ down = open, ▲ up = close
				: (isCollapsed ? '&gt;&gt;' : '&lt;&lt;'); // << >> for desktop
			toggleBtn.innerHTML = arrow;
		}

		toggleBtn.addEventListener('click', () => {
			layout.classList.toggle('sidebar-collapsed');
			toggleBtnTxt();
		});

		window.addEventListener('resize', () => {
			const nowMobile = window.innerWidth <= MOBILE;
			if (nowMobile !== isMobile) {
				isMobile = nowMobile;
				toggleBtnTxt();
			}
		});

		window.addEventListener('load', toggleBtnTxt);
		</script>
	</body>
</html>
